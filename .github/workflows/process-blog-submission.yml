name: Process Blog Submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-submission:
    # Only run if issue title starts with [blog-submission]
    if: startsWith(github.event.issue.title, '[blog-submission]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch issue body via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Use GitHub API to get issue body to avoid shell escaping issues
          gh api "/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            --jq '.body' > /tmp/issue_body.txt

          echo "Fetched issue body ($(wc -c < /tmp/issue_body.txt) bytes)"

      - name: Process submission
        id: process
        run: |
          python3 scripts/process_blog_submission.py /tmp/issue_body.txt

      - name: Create branch and commit
        id: create-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="blog-submission-$ISSUE_NUMBER"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add _posts/
          git commit -m "Add blog post: ${{ steps.process.outputs.title }}

          Submitted by ${{ steps.process.outputs.author }}
          Closes #$ISSUE_NUMBER"

          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr create \
            --title "Blog: ${{ steps.process.outputs.title }}" \
            --body "## Blog Post Submission

          This PR was automatically generated from issue #$ISSUE_NUMBER.

          **Title:** ${{ steps.process.outputs.title }}
          **Author:** ${{ steps.process.outputs.author }}
          **File:** \`${{ steps.process.outputs.filepath }}\`

          ### Review Checklist

          - [ ] Content is appropriate for the OVOS blog
          - [ ] Markdown formatting is correct
          - [ ] Images are properly linked or can be added
          - [ ] No sensitive information included

          ---

          Closes #$ISSUE_NUMBER" \
            --base master \
            --head "${{ steps.create-branch.outputs.branch }}"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_URL=$(gh pr view "${{ steps.create-branch.outputs.branch }}" --json url -q '.url')

          gh issue comment $ISSUE_NUMBER --body "Your blog post submission has been processed!

          A Pull Request has been created: $PR_URL

          The maintainers will review your submission. You may be asked to make changes or add images before it's merged.

          Thank you for contributing to the OpenVoiceOS blog!"

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "Sorry, there was an error processing your blog submission.

          Please check that your submission follows the correct format. You can try:
          1. Going to the [Write page](https://blog.openvoiceos.org/write) and re-submitting
          2. Checking that your markdown content doesn't have any syntax issues

          If the problem persists, please reach out to the maintainers.

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
